name: taramx
include:
  - path: ./taracert/compose.yml
services:
  postfix:
    build: postfix
    depends_on:
      certbot:
        condition: service_healthy
      unbound:
        condition: service_healthy
    volumes:
      - ./postfix/conf:/opt/postfix/conf:z
      - certbot-certs:/etc/letsencrypt:ro,z
      - postfix-vol-1:/var/spool/postfix
    environment:
      - SERVER_HOSTNAME=${SERVER_HOSTNAME}
      - RELAY_DOMAINS=${RELAY_DOMAINS}
      - RELAY_HOST=${RELAY_HOST}
      - SUBMISSION_USER=${SUBMISSION_USER:-}
      - SUBMISSION_PASS=${SUBMISSION_PASS:-}
    ports:
      - '${SMTP_PORT:-25}:25'
      - '${SUBMISSION_PORT:-587}:587'
    networks:
      default:
        ipv4_address: ${IPV4_NETWORK:-172.22.2}.253
        aliases:
          - taramx-postfix
    restart: always
    cap_add:
      - NET_BIND_SERVICE
    dns:
      - ${IPV4_NETWORK:-172.22.2}.254

  unbound:
    build: unbound
    volumes:
      - ./unbound/unbound.conf:/etc/unbound/unbound.conf:ro,Z
    networks:
      default:
        ipv4_address: ${IPV4_NETWORK:-172.22.2}.254
        aliases:
          - taramx-unbound
    restart: always

networks:
  default:
    driver: bridge
    enable_ipv6: true
    driver_opts:
      com.docker.network.bridge.name: br-taramx
    ipam:
      driver: default
      config:
        - subnet: ${IPV4_NETWORK:-172.22.2}.0/24
        - subnet: ${IPV6_NETWORK:-fd00:taramx::}/64

volumes:
  postfix-vol-1:
